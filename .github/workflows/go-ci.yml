name: Go CI

on:
  push:
    branches: [main, staging, production]
  pull_request: 
    branches: [main, staging, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref}}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate Go App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)" || (echo "Go files are not properly formatted. Please run 'gofmt -w .' and commit the changes." && exit 1)
        
      - name: Run vet
        run: go vet ./...

      - name: Run unit tests
        run: go test -v ./...

      - name: Build Go app
        run: go build -o myapp .

  build-and-push-image:
    name: Build and Push Docker Image
    needs: [validate]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps: 
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: log in to Github Container Registry
        uses: docker/login-action@v4
        with:
          registry: gitea.entervise.net
          username: ${{ secrets.GITHUB_REGISTRY_USER }}
          password: ${{ secrets.GITHUB_REGISTRY_PASSWORD }}

      - name: Determine target environment variables
        id: env-vars
        run: |
          CLEAN_TAG=$(echo "${{ github.ref_name }}" | sed 's/\//-/g' | tr '[:upper:]' '[:lower:]')
          echo "clean_tag=$CLEAN_TAG" >> $GITHUB_OUTPUT

          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "lowercase_repo=$LOWERCASE_REPO" >> $GITHUB_OUTPUT
      - name: Build Docker image for testing
        run: |
          docker build \
            -t gitea.entervise.net/${{ steps.env-vars.outputs.lowercase_repo }}:${{ steps.env-vars.outputs.clean_tag }} \
            .

      - name: Run Docker container
        run: |
          docker run -d \
           --name go-app-test \
           -p 8080:8080 \
           gitea.entervise.net/${{ steps.env-vars.outputs.lowercase_repo}}:${{ steps.env-vars.outputs.clean_tag }}

          sleep 5
          docker ps

      - name: Test container health
        run: |
          if curl -f http://localhost:8080/healthz; then
            echo "Health check passed"
          else
            echo "Health check failed"
            docker logs go-app-test
            exit 1
          fi
      - name: Stop test container
        if: always()
        run: |
          docker stop go-app-test || true
          docker rm go-app-test || true

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with: 
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            gitea.entervise.net/${{ steps.env-vars.outputs.lowercase_repo }}:${{ steps.env-vars.outputs.clean_tag }}
            gitea.entervise.net/${{ steps.env-vars.outputs.lowercase_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha

