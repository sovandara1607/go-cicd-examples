name: Go Docker CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs: 
   test-and-build:
      runs-on: ubuntu-latest

      steps:
         - name: Checkout code
           uses: actions/checkout@v4

         - name: Set up Go
           uses: actions/setup-go@v4
           with:
             go-version: '1.23'

         - name: Install dependencies
           run: go mod tidy

         - name: Run tests
           run: go test ./...

         - name: Build Go app
           run: docker build -t my-go-app .
         
         - name: Build Docker image
           run: docker build -t my-go-app .


         - name: Run Docker container
           run: | 
             docker run -d -p 8080:8080 --name my-go-app my-go-app
             sleep 5
             docker ps

         - name: Test container health
           run: curl -f http://localhost:8080/health || curl -f http://localhost:8080

         - name: Stop container
           run: docker stop my-go-app